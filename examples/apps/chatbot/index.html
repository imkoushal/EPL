<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPL Neural Assistant</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --bubble-user: #0284c7;
            --bubble-ai: #334155;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #020617 0%, #172554 100%);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(56, 189, 248, 0.1);
        }
        .header {
            padding: 20px 24px;
            background: rgba(2, 6, 23, 0.4);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dot {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }
            100% { opacity: 1; transform: scale(1); }
        }
        .header-title {
            margin: 0; 
            font-size: 1.25rem; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .chat-box {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar {
            width: 8px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .msg {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-wrap: break-word;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .user-msg {
            background: var(--bubble-user);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
        }
        .ai-msg {
            background: var(--bubble-ai);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .input-area {
            padding: 20px 24px;
            background: rgba(2, 6, 23, 0.6);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
        }
        input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 22px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }
        button {
            background: var(--accent);
            color: #020617;
            border: none;
            border-radius: 14px;
            padding: 0 28px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            background: #7dd3fc;
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
        }
        button:active {
            transform: translateY(1px);
        }
        .typing {
            font-style: italic;
            opacity: 0.7;
        }
        .thinking-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="dot"></div>
            <h2 class="header-title">EPL Neural Assistant <span style="font-size: 0.8em; font-weight: 400; color: #94a3b8;">v2.0 • Powered by Groq</span></h2>
        </div>
        <div class="chat-box" id="chat">
            <div class="msg ai-msg">Network established. I am an advanced Neural Assistant built strictly using the <b>English Programming Language (EPL)</b> backend framework. <br><br>How may I accelerate your objectives today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Synthesize your query..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button onclick="sendMsg()">Transmit</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        async function sendMsg() {
            const text = input.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div class="msg user-msg">${text.replace(/</g, "&lt;")}</div>`;
            input.value = '';
            
            const typingId = 'typing-' + Date.now();
            chat.innerHTML += `<div class="msg ai-msg typing" id="${typingId}">Computing matrix<span class="thinking-dots"></span></div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text })
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                
                document.getElementById(typingId).remove();
                chat.innerHTML += `<div class="msg ai-msg">${data.reply || 'Anomaly: Payload missing from server.'}</div>`;
            } catch (err) {
                document.getElementById(typingId).remove();
                chat.innerHTML += `<div class="msg ai-msg" style="color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2);">Connection terminated. Server anomaly detected.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
