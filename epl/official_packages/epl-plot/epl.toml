[project]
name = "epl-plot"
version = "1.0.0"
description = "Matplotlib-like plotting for EPL - create visualizations in plain English"
author = "EPL Community"
license = "MIT"
entry = "src/main.epl"
keywords = ["matplotlib", "plotting", "visualization", "charts", "graphs"]

[dependencies]
epl-array = ">=1.0.0"

[python]
requires = ["matplotlib>=3.5.0", "numpy>=1.20.0"]

[scripts]
example = "epl run examples/basic.epl"
test = "epl test examples/"
