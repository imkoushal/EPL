[project]
name = "epl-science"
version = "1.0.0"
description = "SciPy-like scientific computing for EPL - optimization, integration, signal processing"
author = "EPL Community"
license = "MIT"
entry = "src/main.epl"
keywords = ["scipy", "science", "optimization", "statistics", "integration", "signal"]

[dependencies]
epl-array = ">=1.0.0"

[python]
requires = ["scipy>=1.7.0", "numpy>=1.20.0"]

[scripts]
example = "epl run examples/basic.epl"
test = "epl test examples/"
